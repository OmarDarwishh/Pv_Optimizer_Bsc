appliances:
- duration_h: 2.0
  name: Dishwasher
  power_kw: 1.5
  window_end: 16
  window_start: 10
- duration_h: 1.5
  name: Washing Machine
  power_kw: 2.0
  window_end: 15
  window_start: 9
- duration_h: 3.0
  name: Water Heater
  power_kw: 3.0
  window_end: 12
  window_start: 0
data:
  file_path: data/raw/dynamic_cairo_target.csv
  frequency: h
  load_column: load_kw
  power_unit: kW
  pv_column: pv_kw
  timestamp_column: timestamp
electricity_price_per_kwh: 2.23
optimization:
  ga:
    crossover_type: single_point
    keep_parents: 2
    mutation_percent: 10
    num_generations: 200
    parent_selection: tournament
    population_size: 100
    random_seed: 42
  method: compare
output:
  log_file: logs/optimizer.log
  plot_dir: output/plots
  plot_format: png
  results_file: output/results.csv
  save_plots: true
plotting:
  dpi: 300
  figure_size:
  - 12
  - 6
  style: seaborn-v0_8-whitegrid
pv_system:
  azimuth: 0
  capacity_kw: 5.0
  latitude: 30.0333
  longitude: 31.4833
  loss_percent: 14
  tilt: 30
  tilt_angle: 30
