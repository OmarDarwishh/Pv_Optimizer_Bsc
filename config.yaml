# Data settings
data:
  file_path: "data/raw/ausgrid_target_day.csv"
  timestamp_column: "timestamp"
  pv_column: "pv_kw"
  load_column: "load_kw"
  frequency: "h"
  power_unit: "kW"

# Appliances to schedule (with Academic Time Windows)
appliances:
  - name: "Dishwasher"
    power_kw: 1.5
    duration_h: 1.0
    window_start: 10 # Cannot start before 10:00
    window_end: 16 # Must start by 16:00
  - name: "Washing Machine"
    power_kw: 2.0
    duration_h: 1.5
    window_start: 9 # Cannot start before 09:00
    window_end: 15 # Must start by 15:00

# Optimization parameters
optimization:
  method: "compare" # Keep compare mode to generate the benchmarking table!
  ga:
    population_size: 100
    num_generations: 200
    mutation_percent: 10
    crossover_type: "single_point"
    parent_selection: "tournament"
    keep_parents: 2
    random_seed: 42

output:
  save_plots: true
  plot_dir: "output/plots"
  results_file: "output/results.csv"
  log_file: "logs/optimizer.log"
  plot_format: "png"

plotting:
  style: "seaborn-v0_8-whitegrid"
  figure_size: [12, 6]
  dpi: 300

electricity_price_per_kwh: 2.23 # Updated to realistic EGP upper tier
